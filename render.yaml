# Render Blueprint — defines both services for one-click deploy.
# Connect this repo on Render via "New + → Blueprint" and Render reads this file.

services:
  # ─── Multiplayer WebSocket server ────────────────────────────────────────
  - type: web
    name: red-rising-institute-server
    runtime: node
    region: oregon
    plan: free
    rootDir: digital/server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
    healthCheckPath: /health

  # ─── Static React client ─────────────────────────────────────────────────
  # Connects to the server above via the VITE_SERVER_URL env var, baked in
  # at build time. The URL is the predictable Render service hostname.
  - type: web
    name: red-rising-institute-client
    runtime: static
    rootDir: digital
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        value: wss://red-rising-institute-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
